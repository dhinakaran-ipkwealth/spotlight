# Nginx site config for https://lead.ipkwealth.com (Spotlight feedback app)
#
# This is the PRE-CERTBOT (HTTP-only) version. Install it first:
#   sudo cp lead.ipkwealth.com.conf /etc/nginx/sites-available/lead.ipkwealth.com.conf
#   sudo ln -sf /etc/nginx/sites-available/lead.ipkwealth.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue the certificate (this rewrites the file in place, adding a
# `listen 443 ssl` server block with ssl_certificate paths under
# /etc/letsencrypt/live/lead.ipkwealth.com/ and an HTTP -> HTTPS redirect,
# the same structure as the existing crm.ipkwealth.com.conf):
#   sudo certbot --nginx -d lead.ipkwealth.com
#
# After that, do NOT re-copy this file over the live config - certbot's
# edits (the 443 block + redirect) live only in /etc/nginx/sites-available/.
# Re-deploys should just run `sudo nginx -t && sudo systemctl reload nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name feedback.ipkwealth.com;

    client_max_body_size 5m;

    # Backend API (NestJS) - feedback form endpoints
    location /feedback {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
