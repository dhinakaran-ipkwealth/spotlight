# Nginx site config for https://lead.ipkwealth.com
# Install: sudo cp lead.ipkwealth.com.conf /etc/nginx/sites-available/
#          sudo ln -s /etc/nginx/sites-available/lead.ipkwealth.com.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# Then run: sudo certbot --nginx -d lead.ipkwealth.com

server {
    listen 80;
    listen [::]:80;
    server_name lead.ipkwealth.com;

    client_max_body_size 5m;

    # Backend API (NestJS) - feedback form endpoints
    location /feedback {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
